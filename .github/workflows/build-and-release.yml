name: Build and release extension

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox git zip

      - name: Update Manifest and Package
        run: |
          chmod +x package.el
          ./package.el test
          ./package.el

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-artifact
          path: Emacs-keybinding-*.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..${{ github.ref_name }}" --oneline --pretty=format:"* %s" > release_notes.md
          else
            git log --oneline --pretty=format:"* %s" > release_notes.md
          fi

          gh release create "${{ github.ref_name }}" Emacs-keybinding*.zip \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes release_notes.md
